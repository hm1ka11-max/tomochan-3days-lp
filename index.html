<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月50万安定の自動化戦略 3Days セミナー</title>
  <meta name="description" content="もう手作業には戻れない。フリープラン徹底活用　月50万安定の自動化戦略 3Daysセミナー" />

  <style>
    :root{
      --bg:#f3f8fb;
      --bg-soft:#edf6fa;
      --white:#ffffff;
      --main:#244c90;
      --main-deep:#1f3f78;
      --sub:#8fd6da;
      --accent:#d7b458;
      --accent-soft:#f4e7b0;
      --text:#33435c;
      --muted:#6c7b91;
      --line:#dbeaf0;
      --shadow:0 12px 32px rgba(36,76,144,.10);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --max:1040px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:
        "Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",
        "Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, #f8fcff 0%, #eef6fa 45%, #edf4f8 100%);
      line-height:1.85;
    }

    img{
      max-width:100%;
      display:block;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .wrap{
      width:min(100% - 32px, var(--max));
      margin:0 auto;
    }

    .section{
      padding:64px 0;
    }

    .section-inner{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:40px 28px;
    }

    .section-kicker{
      display:inline-block;
      margin:0 auto 12px;
      padding:6px 14px;
      border-radius:999px;
      background:#eef6fb;
      border:1px solid #d7e8f2;
      color:var(--main);
      font-size:13px;
      font-weight:700;
      letter-spacing:.08em;
    }

    .section-head{
      text-align:center;
      margin-bottom:28px;
    }

    .section-title{
      margin:0;
      font-size:clamp(24px, 4vw, 36px);
      line-height:1.4;
      letter-spacing:.04em;
      color:var(--main);
    }

    .section-lead{
      max-width:760px;
      margin:14px auto 0;
      color:var(--muted);
    }

    .hero{
      padding:24px 0 54px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,.82)),
        linear-gradient(135deg, #d8f0f4 0%, #eff8fb 42%, #f7fbfd 100%);
    }

    .hero-visual{
      width:100%;
      padding:8px 16px 0;
    }

    .hero-visual img{
      width:100%;
      max-width:760px;
      margin:0 auto;
      border-radius:28px;
      box-shadow:0 16px 40px rgba(36,76,144,.14);
    }

    .hero-cta-only{
      max-width:760px;
      margin:24px auto 0;
      text-align:center;
    }

    .btn{
      display:inline-block;
      min-width:260px;
      padding:16px 30px;
      border-radius:999px;
      background:linear-gradient(135deg, #e3c469, #d7b458);
      color:#24344d;
      font-weight:700;
      font-size:18px;
      box-shadow:0 10px 24px rgba(215,180,88,.28);
      transition:transform .2s ease, opacity .2s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:.97;
    }

    .hero-note{
      margin-top:12px;
      font-size:14px;
      color:var(--muted);
    }

    .day-card,
    .benefit-item,
    .voice,
    .result,
    .faq-item,
    .tokuten{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(249,252,253,.96));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
    }

    .schedule-grid,
    .benefit-grid,
    .voice-grid,
    .result-grid,
    .tokuten-grid{
      display:grid;
      gap:20px;
    }

    .schedule-grid{
      grid-template-columns:repeat(3,1fr);
    }

    .benefit-grid,
    .tokuten-grid{
      grid-template-columns:repeat(2,1fr);
    }

    .voice-grid,
    .result-grid{
      grid-template-columns:repeat(3,1fr);
    }

    .day-card{
      padding:24px;
    }

    .day-label{
      display:inline-block;
      margin-bottom:12px;
      padding:6px 12px;
      border-radius:999px;
      background:#f8efc8;
      color:#7a5f10;
      font-size:12px;
      font-weight:700;
    }

    .day-card h3{
      margin:0 0 10px;
      color:var(--main);
      font-size:22px;
      line-height:1.45;
    }

    .date{
      color:var(--main-deep);
      font-weight:700;
      margin-bottom:12px;
    }

    .benefit-item,
    .voice,
    .result,
    .tokuten,
    .faq-item{
      padding:22px 20px;
    }

    .benefit-item strong,
    .result strong{
      color:var(--main);
    }

    .check-list{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px 20px;
      list-style:none;
      padding:0;
      margin:0;
    }

    .check-list li{
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px 18px;
      box-shadow:var(--shadow);
    }

    .profile{
      display:grid;
      grid-template-columns:240px 1fr;
      gap:26px;
      align-items:start;
    }

    .profile-image img{
      border-radius:22px;
      box-shadow:var(--shadow);
    }

    .profile-text h3{
      margin:0 0 8px;
      font-size:28px;
      color:var(--main);
    }

    .sub-title{
      color:var(--muted);
      font-weight:700;
      margin-bottom:12px;
    }

    .faq-item .faq-q{
      color:var(--main);
      font-weight:700;
      margin-bottom:8px;
    }

    .cta{
      padding-bottom:72px;
    }

    .cta-box{
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,248,251,.96));
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:38px 28px;
      text-align:center;
    }

    footer{
      padding:28px 0 46px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width: 860px){
      .section{
        padding:44px 0;
      }

      .section-inner,
      .cta-box{
        padding:28px 18px;
      }

      .schedule-grid,
      .benefit-grid,
      .voice-grid,
      .result-grid,
      .tokuten-grid,
      .check-list,
      .profile{
        grid-template-columns:1fr;
      }

      .hero-visual img{
        max-width:100%;
      }

      .btn{
        width:100%;
        max-width:340px;
      }
    }
/* お悩みセクション */

.trouble-box{
  max-width:860px;
  margin:0 auto;
  background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,252,253,.96));
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:28px 24px;
}

.trouble-list{
  list-style:none;
  margin:0;
  padding:0;
  display:grid;
  gap:16px;
}

.trouble-list li{
  position:relative;
  padding-left:42px;
  font-size:17px;
  line-height:1.9;
}

.trouble-list li::before{
  content:"✓";
  position:absolute;
  left:0;
  top:2px;
  width:28px;
  height:28px;
  border-radius:999px;
  background:linear-gradient(135deg,#e8f7f8,#d8f0f1);
  border:1px solid #bfe4e6;
  color:var(--main);
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}
</head>
<body>

  <!-- ===== ファーストビュー ===== -->
<header class="hero">

  <div class="wrap">

  <!-- ===== 悩み ===== -->
  <section class="section">
  　<div class="wrap">
